<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4월엔 동백꽃을 달아주세요 - 제주 4.3 추모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compatibility mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">
    <style>
        .brush-font { font-family: 'Nanum Brush Script', cursive; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at bottom, #161625 0%, #050505 100%);
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
        }
        #intro-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            background: #0a0a0a; transition: opacity 1.2s ease;
        }
        .intro-camellia { width: 160px; height: 160px; cursor: pointer; filter: drop-shadow(0 0 30px rgba(225, 29, 72, 0.5)); }
        #memorial-tree-container {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; height: 80vh; opacity: 0; transition: opacity 2s;
        }
        .flower-node { position: absolute; z-index: 100; cursor: pointer; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .camellia-flower-svg { width: 45px; height: 45px; }
        #memorial-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; padding: 2rem; border-radius: 20px; z-index: 2000; width: 90%; max-width: 400px;
            border: 1px solid #e11d48;
        }
        #msg-input { width: 100%; height: 120px; background: #222; color: #fff; padding: 15px; border-radius: 10px; border: 1px solid #333; resize: none; margin-bottom: 15px; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--t) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        .tooltip {
            position: fixed; background: white; color: black; padding: 10px 15px; border-radius: 10px;
            display: none; z-index: 3000; pointer-events: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .error-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #e11d48; color: white; padding: 10px 20px; border-radius: 5px;
            z-index: 5000; display: none;
        }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="error-toast" class="error-toast"></div>

    <div id="intro-screen">
        <h2 class="brush-font text-5xl text-rose-100 mb-10">4월엔 동백꽃을 달아주세요</h2>
        <div class="intro-camellia" onclick="startMemorial()">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="32" r="23" fill="#e11d48" /><circle cx="50" cy="68" r="23" fill="#e11d48" />
                <circle cx="32" cy="50" r="23" fill="#e11d48" /><circle cx="68" cy="50" r="23" fill="#e11d48" />
                <circle cx="50" cy="50" r="14" fill="#fbbf24" />
            </svg>
        </div>
        <p class="brush-font text-2xl text-rose-300 mt-8 animate-pulse">동백꽃을 눌러주세요</p>
    </div>

    <div id="main-ui" style="opacity:0;" class="absolute top-10 w-full text-center z-50">
        <h1 class="brush-font text-rose-500 text-5xl">4월엔 동백꽃을 달아주세요</h1>
    </div>

    <div id="memorial-tree-container">
        <svg id="tree-svg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
            <path d="M260,800 L340,800 Q320,550 300,450 Q280,550 260,800 Z" fill="#0f172a" />
            <g id="tree-branches" stroke="#0f172a" fill="none" stroke-width="15" stroke-linecap="round">
                <path d="M300,450 Q200,420 80,450" /><path d="M300,450 Q400,380 520,420" />
                <path d="M300,350 Q200,300 120,250" /><path d="M300,350 Q400,280 480,240" />
                <path d="M300,450 L300,100" stroke-width="12" />
            </g>
        </svg>
        <div id="flower-layer" class="absolute inset-0"></div>
    </div>

    <div id="write-trigger" style="display:none;" class="fixed bottom-10 right-10 w-16 h-16 cursor-pointer z-50" onclick="openMemorial()">
        <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#e11d48" /><path d="M30,50 L70,50 M50,30 L50,70" stroke="white" stroke-width="8" /></svg>
    </div>

    <div id="memorial-modal">
        <h3 class="text-xl font-bold mb-4">메시지 남기기</h3>
        <textarea id="msg-input" placeholder="추모의 글을 남겨주세요..."></textarea>
        <div class="flex justify-end gap-3">
            <button onclick="closeMemorial()" class="text-gray-400">취소</button>
            <button id="send-btn" onclick="plantFlower()" class="bg-rose-600 px-4 py-2 rounded">꽃 피우기</button>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        // === [본인 설정으로 교체] ===
        const firebaseConfig = {
            apiKey: "AIzaSyDTrSN6wwJEAjiL3HwMh9woNmJ5NwSg1cQ",
            authDomain: "tree-7ef79.firebaseapp.com",
            projectId: "tree-7ef79",
            storageBucket: "tree-7ef79.firebasestorage.app",
            messagingSenderId: "495473926266",
            appId: "1:495473926266:web:bce30dde7026b2eff25bc3"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);
        const auth = firebase.auth(app);
        const appId = 'jeju-43-memorial-final';
        
        let currentUser = null;
        const renderedFlowers = new Set();

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // 로그인 및 데이터 로드
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                loadFlowers();
            } else {
                try {
                    await auth.signInAnonymously();
                } catch (e) {
                    showError("로그인 실패: " + e.message);
                }
            }
        });

        function loadFlowers() {
            // 경로 Rule: /artifacts/{appId}/public/data/flowers
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers')
                .onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            if (!renderedFlowers.has(change.doc.id)) {
                                renderFlower(data.x, data.y, data.message, change.doc.id);
                                renderedFlowers.add(change.doc.id);
                            }
                        }
                    });
                }, err => {
                    showError("데이터 로드 실패: Firestore 규칙을 확인하세요.");
                    console.error(err);
                });
        }

        async function plantFlower() {
            const msg = document.getElementById('msg-input').value.trim();
            if (!msg || !currentUser) return;

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.innerText = "피우는 중...";

            try {
                const flowerData = {
                    message: msg,
                    x: Math.random() * 80 + 10,
                    y: Math.random() * 50 + 10,
                    uid: currentUser.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers').add(flowerData);
                closeMemorial();
            } catch (e) {
                showError("저장 실패: " + e.message);
                btn.disabled = false;
                btn.innerText = "꽃 피우기";
            }
        }

        function renderFlower(x, y, msg, id) {
            const layer = document.getElementById('flower-layer');
            const flower = document.createElement('div');
            flower.className = 'flower-node';
            flower.style.left = x + '%'; flower.style.top = y + '%';
            flower.style.transform = 'scale(0)';
            
            flower.innerHTML = `
                <svg viewBox="0 0 100 100" class="camellia-flower-svg">
                    <circle cx="50" cy="30" r="23" fill="#e11d48" /><circle cx="50" cy="70" r="23" fill="#e11d48" />
                    <circle cx="30" cy="50" r="23" fill="#e11d48" /><circle cx="70" cy="50" r="23" fill="#e11d48" />
                    <circle cx="50" cy="50" r="14" fill="#fbbf24" />
                </svg>
            `;

            flower.onclick = (e) => {
                const tt = document.getElementById('tooltip');
                tt.innerText = msg;
                tt.style.display = 'block';
                tt.style.left = e.clientX + 'px'; tt.style.top = (e.clientY - 40) + 'px';
                setTimeout(() => { tt.style.display = 'none'; }, 3000);
            };

            layer.appendChild(flower);
            setTimeout(() => { flower.style.transform = 'scale(1)'; }, 100);
        }

        function startMemorial() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('memorial-tree-container').style.opacity = '1';
                document.getElementById('main-ui').style.opacity = '1';
                document.getElementById('write-trigger').style.display = 'block';
            }, 1200);
        }

        function openMemorial() { document.getElementById('memorial-modal').style.display = 'block'; }
        function closeMemorial() { 
            document.getElementById('memorial-modal').style.display = 'none';
            document.getElementById('msg-input').value = '';
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').innerText = "꽃 피우기";
        }

        // 배경 별 생성
        const starContainer = document.getElementById('stars');
        for(let i=0; i<50; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.width = s.style.height = Math.random()*3+'px';
            s.style.setProperty('--t', Math.random()*3+2+'s');
            starContainer.appendChild(s);
        }
    </script>
</body>
</html>
