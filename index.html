<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4월엔 동백꽃을 달아주세요 - 제주 4.3 추모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compatibility mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-red: #e11d48;
            --primary-yellow: #fbbf24;
            --tree-brown: #2d1a12; /* 나무 색상을 조금 더 밝게 변경 */
        }

        /* 기본 폰트 설정: 시스템 폰트 사용 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background: #050505;
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 별 배경 */
        #stars-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; }

        #main-canvas {
            position: fixed;
            inset: 0;
            z-index: 10;
            overflow: hidden;
            /* 배경을 약간 더 밝은 남색조로 변경하여 나무 대비 향상 */
            background: radial-gradient(circle at bottom, #1e1e35 0%, #050505 100%);
        }

        /* 나무 구도 */
        #tree-container {
            position: absolute;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 800px;
            height: 85vh; 
            opacity: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        #tree-svg {
            width: 100%;
            height: 100%;
            /* 나무에 은은한 광채 추가 */
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.05));
        }

        /* 꽃 스타일 */
        .camellia-flower {
            position: absolute;
            width: clamp(35px, 6vw, 50px);
            height: clamp(35px, 6vw, 50px);
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            pointer-events: auto;
        }

        /* 메시지 말풍선 */
        .message-bubble {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            color: #1a1a1a;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 250px;
            text-align: center;
            display: none;
            pointer-events: none;
            transform: translate(-50%, -130%);
            word-break: keep-all;
            border-top: 4px solid var(--primary-red);
        }

        /* 모달 스타일 */
        #modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 5000; backdrop-filter: blur(4px);
        }
        #memorial-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333;
            width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,1);
            text-align: center;
        }
        #msg-input {
            width: 100%; height: 120px; background: #1a1a1a; color: #fff; border: 1px solid #333;
            border-radius: 12px; padding: 15px; margin: 20px 0; resize: none; outline: none; 
            font-size: 1rem; font-family: inherit; text-align: left; line-height: 1.5;
        }
        #msg-input:focus { border-color: var(--primary-red); }

        /* 플로팅 버튼 */
        #fab {
            position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px;
            cursor: pointer; z-index: 1500; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5));
            transition: transform 0.2s;
        }
        #fab:active { transform: scale(0.9); }

        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9000; display: flex;
            flex-direction: column; justify-content: center; align-items: center; transition: 1s;
        }
        
        .sub-text { font-size: 1.25rem; color: #fda4af; letter-spacing: -0.02em; }
    </style>
</head>
<body>

    <!-- 인트로 -->
    <div id="intro">
        <h2 class="text-3xl font-light text-rose-100 mb-10 tracking-tight">4월엔 동백꽃을 달아주세요</h2>
        <div onclick="startApp()" class="w-32 h-32 cursor-pointer animate-pulse">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="32" r="23" fill="#e11d48" /><circle cx="50" cy="68" r="23" fill="#e11d48" />
                <circle cx="32" cy="50" r="23" fill="#e11d48" /><circle cx="68" cy="50" r="23" fill="#e11d48" />
                <circle cx="50" cy="50" r="14" fill="#fbbf24" />
            </svg>
        </div>
        <p class="mt-10 text-lg text-rose-300 opacity-80">동백꽃을 눌러 시작하세요</p>
    </div>

    <div id="main-canvas">
        <div id="stars-bg"></div>
        
        <div id="tree-container">
            <svg id="tree-svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMax meet">
                <!-- 나무 몸통: 색상을 어두운 갈색으로 변경하고 그림자 효과 개선 -->
                <g fill="var(--tree-brown)">
                    <path d="M220,800 Q300,740 380,800 L350,800 Q330,580 315,480 L285,480 Q270,580 250,800 Z" />
                </g>
                <!-- 나무 가지: 두께 유지 및 색상 조절 -->
                <g id="tree-branches" stroke="var(--tree-brown)" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M300,480 Q180,450 60,490" stroke-width="24" />
                    <path d="M300,480 Q420,420 540,460" stroke-width="24" />
                    <path d="M300,380 Q150,340 100,280" stroke-width="20" />
                    <path d="M300,380 Q450,300 500,270" stroke-width="20" />
                    <path d="M300,480 Q290,250 300,40" stroke-width="22" />
                    <path d="M295,220 Q150,160 180,60" stroke-width="14" />
                    <path d="M305,220 Q450,160 420,60" stroke-width="14" />
                </g>
                <g id="leaf-layer"></g>
            </svg>
            <div id="flower-layer" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <div class="absolute top-10 w-full text-center pointer-events-none z-50 px-6">
            <h1 class="text-rose-600 font-bold mb-2 text-3xl tracking-tighter" style="text-shadow: 0 2px 10px rgba(0,0,0,0.5);">4월엔 동백꽃을 달아주세요</h1>
            <p class="sub-text opacity-80 font-medium" style="text-shadow: 0 1px 5px rgba(0,0,0,0.5);">우리의 기억이 평화의 꽃으로 피어납니다.</p>
        </div>
    </div>

    <!-- 글쓰기 버튼 -->
    <div id="fab" onclick="openModal()">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="rgba(225, 29, 72, 0.2)" stroke="#e11d48" stroke-width="2" />
            <circle cx="50" cy="35" r="18" fill="#e11d48" /><circle cx="50" cy="65" r="18" fill="#e11d48" />
            <circle cx="35" cy="50" r="18" fill="#e11d48" /><circle cx="65" cy="50" r="18" fill="#e11d48" />
            <circle cx="50" cy="50" r="10" fill="#fbbf24" />
        </svg>
    </div>

    <!-- 모달 -->
    <div id="modal-overlay">
        <div id="memorial-modal">
            <h3 class="text-xl font-bold text-rose-100">마음 한 송이 피우기</h3>
            <textarea id="msg-input" maxlength="100" placeholder="추모와 기억의 문장을 적어주세요..."></textarea>
            <div class="flex justify-end gap-6">
                <button onclick="closeModal()" class="text-sm text-gray-400 hover:text-white">취소</button>
                <button id="submit-btn" onclick="saveFlower()" class="bg-rose-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg shadow-rose-900/40">꽃 피우기</button>
            </div>
        </div>
    </div>

    <div id="msg-bubble" class="message-bubble"></div>

    <script>
        let db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'camellia-memorial-shared';
        const renderedIds = new Set();

        function startApp() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('intro').style.display = 'none'; 
                generateLeaves();
            }, 1000);
            initFirebase();
        }

        async function initFirebase() {
            try {
                const config = JSON.parse(__firebase_config);
                firebase.initializeApp(config);
            } catch(e) {
                console.warn("Firebase fallback used");
                firebase.initializeApp({
                    apiKey: "AIzaSyDTrSN6wwJEAjiL3HwMh9woNmJ5NwSg1cQ",
                    authDomain: "tree-7ef79.firebaseapp.com",
                    projectId: "tree-7ef79"
                });
            }
            
            db = firebase.firestore();
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await firebase.auth().signInWithCustomToken(__initial_auth_token);
                } else {
                    await firebase.auth().signInAnonymously();
                }
            } catch(e) { console.error("Auth error", e); }

            const flowersCol = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers');
            
            flowersCol.orderBy('createdAt', 'asc').onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        const id = change.doc.id;
                        if (!renderedIds.has(id)) {
                            createFlower(data.x, data.y, data.message);
                            renderedIds.add(id);
                        }
                    }
                });
            }, err => console.error("Listen error:", err));
            
            createStars();
        }

        function createFlower(x, y, msg) {
            const layer = document.getElementById('flower-layer');
            const flower = document.createElement('div');
            flower.className = 'camellia-flower';
            flower.style.left = x + '%';
            flower.style.top = y + '%';

            flower.innerHTML = `
                <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
                    <circle cx="50" cy="32" r="23" fill="#e11d48" /><circle cx="50" cy="68" r="23" fill="#e11d48" />
                    <circle cx="32" cy="50" r="23" fill="#e11d48" /><circle cx="68" cy="50" r="23" fill="#e11d48" />
                    <circle cx="50" cy="50" r="14" fill="#fbbf24" />
                </svg>
            `;

            const showMessage = (e) => {
                const bubble = document.getElementById('msg-bubble');
                bubble.innerText = msg;
                bubble.style.display = 'block';
                const rect = flower.getBoundingClientRect();
                bubble.style.left = rect.left + (rect.width/2) + 'px';
                bubble.style.top = rect.top + 'px';
                setTimeout(() => { bubble.style.display = 'none'; }, 3000);
            };

            flower.onclick = showMessage;
            flower.ontouchstart = (e) => { e.preventDefault(); showMessage(); };
            layer.appendChild(flower);
            
            setTimeout(() => {
                flower.style.transform = `translate(-50%, -50%) scale(1) rotate(${Math.random() * 360}deg)`;
            }, 50);
        }

        async function saveFlower() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (!msg) return;

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "피우는 중...";

            const x = 15 + Math.random() * 70;
            const y = 10 + Math.random() * 60;

            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers').add({
                    message: msg, 
                    x: x, 
                    y: y, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeModal();
            } catch (e) {
                console.error("Save error", e);
                createFlower(x, y, msg);
                closeModal();
            }
        }

        function generateLeaves() {
            const leafLayer = document.getElementById('leaf-layer');
            const branches = document.querySelectorAll('#tree-branches path');
            const leafColors = ["#1a2e05", "#2a4210", "#152504"]; // 나뭇잎 색상도 미세하게 다양화
            branches.forEach(branch => {
                const length = branch.getTotalLength();
                for (let i = 0; i < length/12; i++) {
                    const point = branch.getPointAtLength(Math.random() * length);
                    const leaf = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                    leaf.setAttribute("cx", point.x + (Math.random()-0.5)*35);
                    leaf.setAttribute("cy", point.y + (Math.random()-0.5)*35);
                    leaf.setAttribute("rx", 7 + Math.random()*5);
                    leaf.setAttribute("ry", 4 + Math.random()*3);
                    leaf.setAttribute("fill", leafColors[Math.floor(Math.random() * leafColors.length)]);
                    leaf.setAttribute("opacity", "0.9");
                    leaf.setAttribute("transform", `rotate(${Math.random()*360} ${leaf.getAttribute("cx")} ${leaf.getAttribute("cy")})`);
                    leafLayer.appendChild(leaf);
                }
            });
        }

        function createStars() {
            const bg = document.getElementById('stars-bg');
            for(let i=0; i<60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random()*1.5 + 0.5;
                star.style.width = star.style.height = size + 'px';
                star.style.left = Math.random()*100+'%';
                star.style.top = Math.random()*100+'%';
                bg.appendChild(star);
            }
        }

        function openModal() { document.getElementById('modal-overlay').style.display = 'block'; document.getElementById('msg-input').focus(); }
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('msg-input').value = '';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "꽃 피우기";
        }
    </script>
</body>
</html>
