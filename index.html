<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4월엔 동백꽃을 달아주세요 - 제주 4.3 추모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nanum Brush Script', cursive;
            background: radial-gradient(circle at bottom, #161625 0%, #050505 100%);
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
            touch-action: none;
        }

        #intro-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: #0a0a0a;
            transition: opacity 1.5s ease;
            padding: 20px;
            text-align: center;
        }

        .intro-camellia {
            width: clamp(140px, 45vw, 200px);
            height: clamp(140px, 45vw, 200px);
            cursor: pointer;
            filter: drop-shadow(0 0 40px rgba(225, 29, 72, 0.6));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .intro-instruction {
            margin-top: 2.5rem;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            color: #fda4af;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        /* 나무 컨테이너 수정: 화면 비율에 상관없이 나무 전체가 보이도록 설정 */
        #memorial-tree-container {
            position: absolute;
            bottom: 5vh; /* 바닥에서 약간 띄워 시각적 안정감 부여 */
            left: 50%;
            transform: translateX(-50%);
            width: 90vw;
            height: 70vh; /* 노트북에서도 전체가 보이도록 높이 조절 */
            max-width: 800px;
            max-height: 800px;
            z-index: 2;
            opacity: 0;
            transition: opacity 2s ease;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        #tree-svg {
            width: 100%;
            height: 100%;
            /* SVG가 컨테이너 내에서 잘리지 않고 전체가 들어오도록 함 */
        }

        #flower-layer {
            position: absolute;
            inset: 0;
            pointer-events: auto;
            z-index: 5;
        }

        .flower-node { 
            position: absolute; 
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translate(-50%, -50%); /* 중심점 정렬 */
        }

        #memorial-modal {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: rgba(12, 8, 12, 0.98); 
            padding: 2.5rem 1.5rem; 
            border-radius: 40px;
            border: 2px solid rgba(225, 29, 72, 0.5); 
            z-index: 5000;
            width: 90%; 
            max-width: 480px;
            box-shadow: 0 0 150px rgba(0, 0, 0, 1); 
            text-align: center;
        }

        #msg-input {
            width: 100%; height: 200px; background: #2a0812; color: #fff; 
            padding: 20px; border: none; border-radius: 25px; resize: none;
            font-family: 'Nanum Brush Script', cursive; text-align: center;
            outline: none; font-size: 1.8rem;
            line-height: 1.4;
            -webkit-appearance: none;
        }

        .btn-send {
            background: #e11d48; color: white; padding: 12px 50px; border-radius: 40px;
            font-size: 2.2rem; transition: 0.3s; border: none; cursor: pointer;
            margin-top: 1rem;
            box-shadow: 0 5px 15px rgba(225, 29, 72, 0.4);
            touch-action: manipulation;
        }
        .btn-send:active { transform: scale(0.95); opacity: 0.8; }
        .btn-send:disabled { background: #4c1d24; cursor: not-allowed; opacity: 0.6; }

        .tooltip {
            position: fixed; background: #fff; color: #0f172a; padding: 16px 24px;
            border-radius: 22px; font-size: 1.8rem; display: none; z-index: 6000;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6); pointer-events: none;
            max-width: 280px; text-align: center;
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.25; pointer-events: none; }
        .fade-out { opacity: 0 !important; pointer-events: none !important; }
        .visible-ui { opacity: 1 !important; pointer-events: auto !important; }
        
        #write-trigger {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

    <div id="stars"></div>

    <div id="intro-screen">
        <h2 class="text-4xl text-rose-100 mb-14">4월엔 동백꽃을 달아주세요</h2>
        <div class="intro-camellia" id="start-btn">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="32" r="23" fill="#e11d48" />
                <circle cx="50" cy="68" r="23" fill="#e11d48" />
                <circle cx="32" cy="50" r="23" fill="#e11d48" />
                <circle cx="68" cy="50" r="23" fill="#e11d48" />
                <circle cx="50" cy="50" r="14" fill="#fbbf24" />
            </svg>
        </div>
        <p class="intro-instruction">동백꽃을 눌러 평화의 나무를 만나보세요</p>
    </div>

    <div id="main-ui" class="opacity-0 pointer-events-none absolute top-10 left-0 w-full text-center z-50 px-5 transition-opacity duration-1000">
        <h1 class="text-rose-500 text-5xl md:text-7xl" style="text-shadow: 0 0 25px rgba(225, 29, 72, 0.6);">4월엔 동백꽃을 달아주세요</h1>
        <p class="text-2xl text-slate-300 mt-2">우리 모두의 마음이 모여 피어납니다.</p>
    </div>

    <div id="memorial-tree-container">
        <!-- preserveAspectRatio를 xMidYMid meet로 설정하여 나무 전체가 중앙에 배치되도록 함 -->
        <svg id="tree-svg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <g fill="#080808">
                <path d="M255,800 L345,800 Q325,580 310,480 L290,480 Q275,580 255,800 Z" />
            </g>
            <g id="tree-branches" stroke="#080808" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M300,480 Q180,450 60,490" stroke-width="20" />
                <path d="M300,480 Q420,420 540,460" stroke-width="20" />
                <path d="M300,380 Q150,340 100,280" stroke-width="15" />
                <path d="M300,380 Q450,300 500,270" stroke-width="15" />
                <path d="M300,480 Q290,250 300,40" stroke-width="18" />
            </g>
            <g id="leaf-layer"></g>
        </svg>
        <div id="flower-layer"></div>
    </div>

    <div id="write-trigger" class="fixed bottom-10 right-10 w-24 h-24 cursor-pointer z-[4000]">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="rgba(225, 29, 72, 0.4)" stroke="#e11d48" stroke-width="2.5" />
            <circle cx="50" cy="35" r="18" fill="#e11d48" />
            <circle cx="50" cy="65" r="18" fill="#e11d48" />
            <circle cx="35" cy="50" r="18" fill="#e11d48" />
            <circle cx="65" cy="50" r="18" fill="#e11d48" />
            <circle cx="50" cy="50" r="10" fill="#fbbf24" />
        </svg>
    </div>

    <div id="memorial-modal">
        <h2 class="text-4xl text-rose-200 mb-6">마음 한 송이 피우기</h2>
        <textarea id="msg-input" maxlength="150" placeholder="기억의 문장을 적어주세요..."></textarea>
        <div id="char-indicator" class="text-rose-400 text-xl mt-2 text-right">0 / 150</div>
        <div class="flex justify-center gap-10 mt-6">
            <button id="close-btn" class="text-2xl text-slate-500">닫기</button>
            <button id="send-btn" class="btn-send">꽃 피우기</button>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTrSN6wwJEAjiL3HwMh9woNmJ5NwSg1cQ",
            authDomain: "tree-7ef79.firebaseapp.com",
            projectId: "tree-7ef79",
            storageBucket: "tree-7ef79.firebasestorage.app",
            messagingSenderId: "495473926266",
            appId: "1:495473926266:web:bce30dde7026b2eff25bc3"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);
        const auth = firebase.auth(app);
        const appId = 'camellia-memorial-final-v3'; 

        async function initAuth() {
            try {
                if (!auth.currentUser) await auth.signInAnonymously();
            } catch (e) { console.error("Auth error:", e); }
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 70; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2 + 0.5;
                s.style.width = size + 'px'; s.style.height = size + 'px';
                s.style.top = Math.random() * 100 + '%'; s.style.left = Math.random() * 100 + '%';
                container.appendChild(s);
            }
        }

        function generateLeaves() {
            const leafLayer = document.getElementById('leaf-layer');
            const branches = document.querySelectorAll('#tree-branches path');
            branches.forEach(branch => {
                const length = branch.getTotalLength();
                for (let i = 0; i < length/15; i++) {
                    const point = branch.getPointAtLength(Math.random() * length);
                    const leaf = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                    leaf.setAttribute("cx", point.x + (Math.random()-0.5)*30);
                    leaf.setAttribute("cy", point.y + (Math.random()-0.5)*30);
                    leaf.setAttribute("rx", 10); leaf.setAttribute("ry", 6);
                    leaf.setAttribute("fill", "#1a2e05");
                    leaf.setAttribute("transform", `rotate(${Math.random()*360} ${leaf.getAttribute("cx")} ${leaf.getAttribute("cy")})`);
                    leafLayer.appendChild(leaf);
                }
            });
        }

        const intro = document.getElementById('intro-screen');
        const startBtn = document.getElementById('start-btn');
        const modal = document.getElementById('memorial-modal');
        const trigger = document.getElementById('write-trigger');
        const sendBtn = document.getElementById('send-btn');
        const closeBtn = document.getElementById('close-btn');
        const msgInput = document.getElementById('msg-input');

        startBtn.addEventListener('click', () => {
            intro.classList.add('fade-out');
            document.getElementById('memorial-tree-container').style.opacity = '1';
            document.getElementById('main-ui').classList.add('visible-ui');
            trigger.classList.add('visible-ui');
            generateLeaves();
            loadFlowers();
        });

        trigger.addEventListener('click', () => {
            modal.style.display = 'block';
            msgInput.focus();
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        sendBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const msg = msgInput.value.trim();
            if (!msg) return;

            sendBtn.disabled = true;
            sendBtn.innerText = "피우는 중...";

            try {
                await initAuth();
                const x = Math.random() * 70 + 15; 
                const y = Math.random() * 50 + 15; 

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers').add({
                    message: msg, x, y, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                msgInput.value = '';
                document.getElementById('char-indicator').innerText = '0 / 150';
                modal.style.display = 'none';
            } catch (err) {
                console.error("전송 실패:", err);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "꽃 피우기";
            }
        });

        function loadFlowers() {
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers')
                .onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === "added") {
                            const d = change.doc.data();
                            renderFlower(d.x, d.y, d.message);
                        }
                    });
                });
        }

        function renderFlower(x, y, msg) {
            const layer = document.getElementById('flower-layer');
            const wrap = document.createElement('div');
            wrap.className = 'flower-node';
            wrap.style.left = x + '%'; wrap.style.top = y + '%';
            
            wrap.innerHTML = `
                <svg viewBox="0 0 100 100" class="camellia-flower-svg" style="width:clamp(30px, 4vw, 45px); height:clamp(30px, 4vw, 45px);">
                    <circle cx="50" cy="30" r="22" fill="#e11d48" />
                    <circle cx="50" cy="70" r="22" fill="#e11d48" />
                    <circle cx="30" cy="50" r="22" fill="#e11d48" />
                    <circle cx="70" cy="50" r="22" fill="#e11d48" />
                    <circle cx="50" cy="50" r="12" fill="#fbbf24" />
                </svg>
            `;

            wrap.addEventListener('click', (e) => {
                const tt = document.getElementById('tooltip');
                tt.innerText = msg;
                tt.style.display = 'block';
                tt.style.left = (e.clientX - 100) + 'px';
                tt.style.top = (e.clientY - 100) + 'px';
                setTimeout(() => tt.style.display = 'none', 3000);
            });

            layer.appendChild(wrap);
        }

        msgInput.addEventListener('input', (e) => {
            document.getElementById('char-indicator').innerText = `${e.target.value.length} / 150`;
        });

        window.onload = () => {
            initAuth();
            createStars();
        };
    </script>
</body>
</html>
