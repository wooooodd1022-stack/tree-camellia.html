<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4월엔 동백꽃을 달아주세요 - 제주 4.3 추모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compatibility mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
            background: #050505;
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
            touch-action: manipulation;
        }
        
        /* 인트로 배경 */
        #intro-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); 
            transition: opacity 1.5s ease;
        }

        /* 나무 구역 설정 - 꽃이 보이지 않는 근본 원인 해결을 위해 absolute 배치 최적화 */
        #tree-world {
            position: relative;
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            transition: opacity 2s;
        }

        /* 나무 본체 */
        #tree-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 80vh;
            margin-bottom: 20px;
            pointer-events: none; /* 클릭 이벤트가 하위 꽃으로 전달되게 함 */
        }

        #tree-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 꽃 레이어 - 나무 컨테이너 안에서 나무와 동일한 좌표계를 사용 */
        #flower-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto; /* 꽃은 클릭 가능해야 함 */
            z-index: 300;
        }

        .camellia-flower {
            position: absolute;
            width: 38px;
            height: 38px;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            cursor: pointer;
            pointer-events: auto;
        }

        /* 모달 및 UI */
        #memorial-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(18, 18, 18, 0.95); padding: 2rem; border-radius: 24px; z-index: 9000; 
            width: 90%; max-width: 380px; border: 1px solid #e11d48;
            backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        #msg-input {
            width: 100%; height: 120px; background: #000; color: #fff; border: 1px solid #333;
            border-radius: 12px; padding: 12px; margin: 15px 0; resize: none; outline: none;
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.2; pointer-events: none; }
        
        .tooltip {
            position: fixed; background: white; color: black; padding: 10px 16px; border-radius: 10px;
            font-size: 14px; font-weight: 600; pointer-events: none; z-index: 9500; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-align: center; max-width: 200px;
        }

        /* 애니메이션 */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse-btn { animation: pulse-soft 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <div id="stars-bg"></div>

    <!-- 인트로 -->
    <div id="intro-screen">
        <h2 class="text-2xl font-bold text-rose-100 mb-8 tracking-tight">4월엔 동백꽃을 달아주세요</h2>
        <div id="start-btn" class="w-32 h-32 cursor-pointer pulse-btn">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="35" r="22" fill="#e11d48" /><circle cx="50" cy="65" r="22" fill="#e11d48" />
                <circle cx="35" cy="50" r="22" fill="#e11d48" /><circle cx="65" cy="50" r="22" fill="#e11d48" />
                <circle cx="50" cy="50" r="12" fill="#fbbf24" />
            </svg>
        </div>
        <p class="mt-8 text-rose-300 opacity-60">화면을 눌러 시작하세요</p>
    </div>

    <!-- 메인 월드 -->
    <div id="tree-world">
        <div class="absolute top-16 w-full text-center px-6">
            <h1 class="text-rose-500 text-3xl font-black mb-2">4월의 기억</h1>
            <p class="text-rose-100 opacity-70 text-sm">동백꽃을 눌러 추모의 메시지를 확인하세요.</p>
        </div>

        <div id="tree-container">
            <!-- 나무 그래픽 -->
            <svg id="tree-svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMax meet">
                <path d="M280,800 L320,800 L310,500 L290,500 Z" fill="#121212" />
                <g id="branches" stroke="#121212" fill="none" stroke-width="12" stroke-linecap="round">
                    <path d="M300,550 Q200,500 100,550" />
                    <path d="M300,550 Q400,450 500,500" />
                    <path d="M300,400 Q200,350 150,250" />
                    <path d="M300,400 Q400,300 450,250" />
                    <path d="M300,250 L300,100" />
                </g>
                <g id="leaves"></g>
            </svg>
            <!-- 꽃이 실제로 렌더링되는 캔버스 -->
            <div id="flower-canvas"></div>
        </div>

        <!-- 글쓰기 버튼 -->
        <div id="write-btn" class="fixed bottom-10 right-8 w-20 h-20 cursor-pointer z-[500] hover:scale-110 transition-transform">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="35" r="22" fill="#e11d48" /><circle cx="50" cy="65" r="22" fill="#e11d48" />
                <circle cx="35" cy="50" r="22" fill="#e11d48" /><circle cx="65" cy="50" r="22" fill="#e11d48" />
                <circle cx="50" cy="50" r="12" fill="#fbbf24" />
            </svg>
        </div>
    </div>

    <!-- 모달 -->
    <div id="memorial-modal">
        <h3 class="text-xl font-bold text-rose-100">추모글 남기기</h3>
        <textarea id="msg-input" placeholder="여기에 따뜻한 한마디를 적어주세요..."></textarea>
        <div class="flex justify-end gap-4">
            <button id="cancel-btn" class="text-gray-400 font-bold px-2">취소</button>
            <button id="submit-btn" class="bg-rose-600 text-white px-6 py-2 rounded-full font-bold">꽃 피우기</button>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        let db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'camellia-memorial-0403';
        const renderedSet = new Set();

        // 초기화
        function initApp() {
            try {
                const config = JSON.parse(__firebase_config);
                firebase.initializeApp(config);
            } catch(e) {
                console.warn("Using default config");
                firebase.initializeApp({
                    apiKey: "AIzaSyDTrSN6wwJEAjiL3HwMh9woNmJ5NwSg1cQ",
                    authDomain: "tree-7ef79.firebaseapp.com",
                    projectId: "tree-7ef79"
                });
            }
            db = firebase.firestore();
            
            firebase.auth().signInAnonymously().then(() => {
                listenFlowers();
            });

            createStars();
            createLeaves();
        }

        // 꽃 실시간 감시
        function listenFlowers() {
            const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers');
            path.onSnapshot(snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (!renderedSet.has(change.doc.id)) {
                            renderFlowerOnTree(data.x, data.y, data.message);
                            renderedSet.add(change.doc.id);
                        }
                    }
                });
            }, err => console.error("Snapshot error:", err));
        }

        // 화면에 꽃 그리기
        function renderFlowerOnTree(x, y, msg) {
            const canvas = document.getElementById('flower-canvas');
            if (!canvas) return;

            const flower = document.createElement('div');
            flower.className = 'camellia-flower';
            // 좌표를 퍼센트로 적용 (부모 container 기준)
            flower.style.left = x + '%';
            flower.style.top = y + '%';
            
            flower.innerHTML = `
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="35" r="22" fill="#e11d48" /><circle cx="50" cy="65" r="22" fill="#e11d48" />
                    <circle cx="35" cy="50" r="22" fill="#e11d48" /><circle cx="65" cy="50" r="22" fill="#e11d48" />
                    <circle cx="50" cy="50" r="12" fill="#fbbf24" />
                </svg>
            `;

            // 클릭 시 메시지 팝업
            const showMsg = (e) => {
                e.stopPropagation();
                const tt = document.getElementById('tooltip');
                tt.innerText = msg;
                tt.style.display = 'block';
                
                const rect = flower.getBoundingClientRect();
                tt.style.left = (rect.left - 80) + 'px';
                tt.style.top = (rect.top - 60) + 'px';
                
                setTimeout(() => { tt.style.display = 'none'; }, 3000);
            };

            flower.addEventListener('click', showMsg);
            flower.addEventListener('touchstart', showMsg, {passive: true});

            canvas.appendChild(flower);
            
            // 나타나는 애니메이션
            setTimeout(() => {
                flower.style.transform = `translate(-50%, -50%) scale(1) rotate(${Math.random() * 30 - 15}deg)`;
            }, 50);
        }

        // 꽃 저장하기
        async function submitMemorial() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (!msg) return;

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "피우는 중...";

            // 가지 근처에 꽃이 피도록 좌표 범위 설정 (나무 이미지 중심 부근)
            const x = 15 + Math.random() * 70;
            const y = 15 + Math.random() * 55;

            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers').add({
                    message: msg,
                    x: x,
                    y: y,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeModal();
            } catch (e) {
                console.error("Save failed:", e);
                // 실패해도 사용자에게는 보여줌 (로컬 렌더링)
                renderFlowerOnTree(x, y, msg);
                closeModal();
            }
        }

        // 나뭇잎 생성 (SVG 내부)
        function createLeaves() {
            const leavesG = document.getElementById('leaves');
            const branches = document.querySelectorAll('#branches path');
            branches.forEach(path => {
                const len = path.getTotalLength();
                for (let i=0; i<len; i+=40) {
                    const pt = path.getPointAtLength(i);
                    for(let j=0; j<2; j++) {
                        const leaf = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        leaf.setAttribute("cx", pt.x + (Math.random()*60-30));
                        leaf.setAttribute("cy", pt.y + (Math.random()*60-30));
                        leaf.setAttribute("r", 4 + Math.random()*4);
                        leaf.setAttribute("fill", "#064e3b");
                        leaf.setAttribute("opacity", "0.6");
                        leavesG.appendChild(leaf);
                    }
                }
            });
        }

        // 별 생성
        function createStars() {
            const bg = document.getElementById('stars-bg');
            for(let i=0; i<80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = (Math.random()*2+1)+'px';
                star.style.left = Math.random()*100+'%';
                star.style.top = Math.random()*100+'%';
                bg.appendChild(star);
            }
        }

        // UI 제어
        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = () => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('tree-world').style.opacity = '1';
            }, 1500);
        };

        const openModal = () => document.getElementById('memorial-modal').style.display = 'block';
        const closeModal = () => {
            document.getElementById('memorial-modal').style.display = 'none';
            document.getElementById('msg-input').value = '';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "꽃 피우기";
        };

        document.getElementById('write-btn').onclick = openModal;
        document.getElementById('cancel-btn').onclick = closeModal;
        document.getElementById('submit-btn').onclick = submitMemorial;

        window.onload = initApp;
    </script>
</body>
</html>
