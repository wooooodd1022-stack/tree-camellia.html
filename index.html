<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4월엔 동백꽃을 달아주세요 - 제주 4.3 추모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compatibility mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        /* 기본 시스템 글꼴 사용 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Pretendard JP", "Pretendard", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at bottom, #161625 0%, #050505 100%);
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
            touch-action: manipulation;
        }
        
        /* 인트로 화면 */
        #intro-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: #0a0a0a; transition: opacity 1.2s ease;
        }
        .intro-camellia { width: clamp(140px, 40vw, 180px); cursor: pointer; filter: drop-shadow(0 0 30px rgba(225, 29, 72, 0.5)); transition: 0.3s; }
        .intro-camellia:active { transform: scale(0.9); }

        /* 나무 컨테이너 */
        #memorial-tree-container {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; height: 85vh; opacity: 0; transition: opacity 2s;
            pointer-events: none;
            display: flex; justify-content: center; align-items: flex-end;
        }

        #tree-svg { width: 100%; height: 100%; pointer-events: none; overflow: visible; }

        /* 꽃 레이어 */
        #flower-layer { 
            position: absolute; inset: 0; 
            z-index: 200; 
            pointer-events: auto; 
        }

        .flower-node { 
            position: absolute; cursor: pointer; 
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            width: 44px; height: 44px;
            display: flex; justify-content: center; align-items: center;
        }
        
        /* 모달 디자인 */
        #memorial-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #121212; padding: 2.5rem 2rem; border-radius: 24px; z-index: 6000; width: 90%; max-width: 400px;
            border: 1px solid #e11d48; box-shadow: 0 0 80px rgba(0,0,0,0.9);
            text-align: center;
        }
        #msg-input { 
            width: 100%; height: 140px; background: #1a1a1a; color: #fff; padding: 15px; 
            border-radius: 12px; border: 1px solid #333; resize: none; margin-bottom: 20px;
            font-size: 1rem; outline: none; line-height: 1.6;
        }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--t) infinite; pointer-events: none; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        
        /* 툴팁 */
        .tooltip {
            position: fixed; background: rgba(255, 255, 255, 0.95); color: #1a1a1a; padding: 14px 20px; border-radius: 12px;
            display: none; z-index: 7000; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 1rem; max-width: 260px; text-align: center; font-weight: 500;
            word-break: keep-all; backdrop-filter: blur(5px);
        }
        
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(225, 29, 72, 0.95); color: white; padding: 12px 30px; border-radius: 50px;
            z-index: 8000; display: none; font-weight: 600; font-size: 0.95rem;
        }

        /* 작성 버튼 효과 */
        .camellia-btn {
            filter: drop-shadow(0 4px 15px rgba(225, 29, 72, 0.4));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .camellia-btn:hover { transform: scale(1.1) rotate(10deg); }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="toast" class="toast"></div>

    <!-- 시작 화면 -->
    <div id="intro-screen">
        <h2 class="text-3xl font-bold text-rose-100 mb-10">4월엔 동백꽃을 달아주세요</h2>
        <div class="intro-camellia" id="start-memorial-btn">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="32" r="23" fill="#e11d48" /><circle cx="50" cy="68" r="23" fill="#e11d48" />
                <circle cx="32" cy="50" r="23" fill="#e11d48" /><circle cx="68" cy="50" r="23" fill="#e11d48" />
                <circle cx="50" cy="50" r="14" fill="#fbbf24" />
            </svg>
        </div>
        <p class="text-lg text-rose-300 mt-8 animate-pulse font-medium">동백꽃을 눌러주세요</p>
    </div>

    <!-- 상단 텍스트 -->
    <div id="main-ui" style="opacity:0;" class="absolute top-12 w-full text-center z-[50] transition-opacity duration-1000 pointer-events-none">
        <h1 class="text-rose-500 text-4xl font-black mb-3">4월엔 동백꽃을 달아주세요</h1>
        <p class="text-rose-100 text-lg font-medium opacity-80">기억은 지지 않는 꽃이 됩니다.</p>
    </div>

    <!-- 추모 나무 구역 -->
    <div id="memorial-tree-container">
        <svg id="tree-svg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
            <!-- 나무 기둥 -->
            <path d="M260,800 L340,800 Q320,550 300,450 Q280,550 260,800 Z" fill="#0f0f1a" />
            <!-- 나뭇가지 -->
            <g id="tree-branches" stroke="#0f0f1a" fill="none" stroke-width="15" stroke-linecap="round">
                <path d="M300,450 Q200,420 80,450" />
                <path d="M300,450 Q400,380 520,420" />
                <path d="M300,350 Q200,300 120,250" />
                <path d="M300,350 Q400,280 480,240" />
                <path d="M300,450 L300,100" stroke-width="12" />
                <path d="M300,250 Q180,200 100,150" stroke-width="8" />
                <path d="M300,250 Q420,180 500,150" stroke-width="8" />
            </g>
            <!-- 나뭇잎 레이어 -->
            <g id="leaf-layer"></g>
        </svg>
        <!-- 꽃이 피어날 레이어 -->
        <div id="flower-layer"></div>
    </div>

    <!-- 동백꽃 작성 버튼 -->
    <div id="write-trigger" style="display:none;" class="fixed bottom-10 right-10 w-24 h-24 cursor-pointer z-[500] camellia-btn">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="32" r="23" fill="#e11d48" /><circle cx="50" cy="68" r="23" fill="#e11d48" />
            <circle cx="32" cy="50" r="23" fill="#e11d48" /><circle cx="68" cy="50" r="23" fill="#e11d48" />
            <circle cx="50" cy="50" r="14" fill="#fbbf24" />
        </svg>
        <p class="text-rose-200 text-center text-sm font-bold mt-1">추모하기</p>
    </div>

    <!-- 글쓰기 모달 -->
    <div id="memorial-modal">
        <h3 class="text-2xl font-bold text-rose-100 mb-6">추모의 글 남기기</h3>
        <textarea id="msg-input" placeholder="따뜻한 기억의 문장을 적어주세요..."></textarea>
        <div class="flex justify-center gap-6">
            <button id="close-modal-btn" class="text-lg text-gray-400 font-semibold px-4">닫기</button>
            <button id="send-btn" class="text-lg font-bold bg-rose-600 text-white px-8 py-2.5 rounded-full shadow-lg">꽃 피우기</button>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jeju-43-memorial-final';

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const renderedIds = new Set();

        function showToast(m) {
            const t = document.getElementById('toast');
            if (t) {
                t.innerText = m; t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
            }
        }

        // 나뭇잎 생성 (미리보기 나무를 풍성하게)
        function generateLeaves() {
            const leafLayer = document.getElementById('leaf-layer');
            const branches = document.querySelectorAll('#tree-branches path');
            const leafColors = ['#064e3b', '#065f46', '#047857', '#064e3b'];

            branches.forEach(branch => {
                const length = branch.getTotalLength();
                const step = 25;
                for (let i = 0; i < length; i += step) {
                    const point = branch.getPointAtLength(i);
                    for (let j = 0; j < 2; j++) {
                        const leaf = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                        const ox = (Math.random() - 0.5) * 50;
                        const oy = (Math.random() - 0.5) * 50;
                        leaf.setAttribute("cx", point.x + ox);
                        leaf.setAttribute("cy", point.y + oy);
                        leaf.setAttribute("rx", 7 + Math.random() * 9);
                        leaf.setAttribute("ry", 5 + Math.random() * 5);
                        leaf.setAttribute("fill", leafColors[Math.floor(Math.random() * leafColors.length)]);
                        leaf.setAttribute("opacity", "0.8");
                        leaf.setAttribute("transform", `rotate(${Math.random() * 360} ${point.x + ox} ${point.y + oy})`);
                        leafLayer.appendChild(leaf);
                    }
                }
            });
        }

        // 인증 처리 (익명 로그인)
        async function startAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            } catch (error) {
                console.error("Auth Error:", error);
                if (error.code !== 'auth/admin-restricted-operation') {
                    try { await auth.signInAnonymously(); } catch (e) {}
                }
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                loadFlowers();
            }
        });

        // 꽃 불러오기 (Firestore 자동 로드)
        function loadFlowers() {
            const flowerColl = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers');
            flowerColl.onSnapshot((snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (!renderedIds.has(change.doc.id)) {
                            renderFlower(data.x, data.y, data.message);
                            renderedIds.add(change.doc.id);
                        }
                    }
                });
            }, (err) => {
                console.error("Firestore Listen Error:", err);
            });
        }

        // 꽃 피우기 (Firebase 저장)
        async function plantFlower() {
            const user = auth.currentUser;
            if (!user) return showToast("인증 진행 중입니다...");

            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (!msg) return;

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.innerText = "피우는 중...";

            try {
                // 나무 영역 내 랜덤 좌표
                const x = 25 + (Math.random() * 50); 
                const y = 10 + (Math.random() * 55);

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers').add({
                    message: msg,
                    x: x,
                    y: y,
                    uid: user.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                closeModal();
                showToast("동백꽃 한 송이가 피어났습니다.");
            } catch (e) {
                console.error("Save Error:", e);
                showToast("꽃을 피우지 못했습니다.");
                btn.disabled = false;
                btn.innerText = "꽃 피우기";
            }
        }

        // 화면에 꽃 렌더링
        function renderFlower(x, y, msg) {
            const layer = document.getElementById('flower-layer');
            const wrap = document.createElement('div');
            wrap.className = 'flower-node';
            wrap.style.left = x + '%'; 
            wrap.style.top = y + '%';
            
            wrap.innerHTML = `
                <svg viewBox="0 0 100 100" width="40" height="40" style="filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6))">
                    <circle cx="50" cy="32" r="23" fill="#e11d48" />
                    <circle cx="50" cy="68" r="23" fill="#e11d48" />
                    <circle cx="32" cy="50" r="23" fill="#e11d48" />
                    <circle cx="68" cy="50" r="23" fill="#e11d48" />
                    <circle cx="50" cy="50" r="14" fill="#fbbf24" />
                </svg>
            `;

            const handleInteraction = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const tt = document.getElementById('tooltip');
                tt.innerText = msg;
                tt.style.display = 'block';
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                let tx = clientX - 130;
                let ty = clientY - 80;
                if (tx < 10) tx = 10;
                if (tx + 260 > window.innerWidth) tx = window.innerWidth - 270;
                
                tt.style.left = tx + 'px'; tt.style.top = ty + 'px';
                setTimeout(() => tt.style.display = 'none', 4000);
            };

            wrap.addEventListener('mousedown', handleInteraction);
            wrap.addEventListener('touchstart', handleInteraction, {passive: false});

            layer.appendChild(wrap);
            setTimeout(() => wrap.style.transform = `translate(-50%, -50%) scale(1) rotate(${Math.random()*360}deg)`, 50);
        }

        // 인트로 버튼 이벤트
        document.getElementById('start-memorial-btn').onclick = () => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('memorial-tree-container').style.opacity = '1';
                document.getElementById('main-ui').style.opacity = '1';
                document.getElementById('write-trigger').style.display = 'block';
                generateLeaves();
            }, 1200);
        };

        const openModal = () => { document.getElementById('memorial-modal').style.display = 'block'; };
        const closeModal = () => { 
            document.getElementById('memorial-modal').style.display = 'none'; 
            document.getElementById('msg-input').value = '';
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').innerText = "꽃 피우기";
        };

        document.getElementById('write-trigger').onclick = openModal;
        document.getElementById('close-modal-btn').onclick = closeModal;
        document.getElementById('send-btn').onclick = plantFlower;

        // 배경 별 생성
        const starsContainer = document.getElementById('stars');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.width = s.style.height = (Math.random()*2 + 1)+'px';
            s.style.setProperty('--t', (Math.random()*4 + 2)+'s');
            starsContainer.appendChild(s);
        }

        window.onload = startAuth;
    </script>
</body>
</html>
