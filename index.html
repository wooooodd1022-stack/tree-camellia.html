<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4월엔 동백꽃을 달아주세요 - 제주 4.3 추모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
            background: #050505;
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
            touch-action: none; /* 화면 전체 드래그 방지 */
        }
        
        /* 배경 별 */
        #stars-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; }

        /* 메인 컨테이너 */
        #main-canvas {
            position: fixed;
            inset: 0;
            z-index: 10;
            overflow: hidden;
            background: radial-gradient(circle at bottom, #1a1a2e 0%, #050505 100%);
        }

        /* 나무 배경 (장식용) */
        #bg-tree {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            opacity: 0.2;
            pointer-events: none;
        }

        /* 꽃 스타일 */
        .camellia-flower {
            position: absolute;
            width: 50px;
            height: 50px;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px rgba(225, 29, 72, 0.5));
            pointer-events: auto;
        }

        /* 메시지 팝업 (말풍선 스타일) */
        .message-bubble {
            position: fixed;
            background: white;
            color: #000;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 250px;
            text-align: center;
            display: none;
            pointer-events: none;
            transform: translate(-50%, -120%);
        }

        /* 모달 */
        #modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 2000; backdrop-filter: blur(5px);
        }
        #memorial-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; padding: 25px; border-radius: 30px; border: 2px solid #e11d48;
            width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(225, 29, 72, 0.3);
        }
        #msg-input {
            width: 100%; height: 150px; background: #000; color: #fff; border: 1px solid #333;
            border-radius: 15px; padding: 15px; margin: 15px 0; resize: none; outline: none; font-size: 16px;
        }

        /* UI 버튼 */
        #fab {
            position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px;
            background: #e11d48; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 1500; box-shadow: 0 5px 20px rgba(225,29,72,0.5);
        }

        /* 인트로 */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 3000; display: flex;
            flex-direction: column; justify-content: center; align-items: center; transition: 1s;
        }
    </style>
</head>
<body>

    <div id="intro">
        <h2 class="text-3xl font-bold text-rose-100 mb-10">4월엔 동백꽃을 달아주세요</h2>
        <div onclick="startApp()" class="w-32 h-32 cursor-pointer animate-bounce">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="35" r="22" fill="#e11d48" /><circle cx="50" cy="65" r="22" fill="#e11d48" />
                <circle cx="35" cy="50" r="22" fill="#e11d48" /><circle cx="65" cy="50" r="22" fill="#e11d48" />
                <circle cx="50" cy="50" r="12" fill="#fbbf24" />
            </svg>
        </div>
        <p class="mt-10 text-rose-300">동백꽃을 눌러 시작하세요</p>
    </div>

    <div id="main-canvas">
        <div id="stars-bg"></div>
        
        <!-- 중앙 하단 나무 실루엣 -->
        <svg id="bg-tree" viewBox="0 0 600 800">
            <path d="M280,800 L320,800 L310,400 L290,400 Z" fill="#111" />
            <path d="M300,450 Q200,400 100,450" stroke="#111" stroke-width="10" fill="none" />
            <path d="M300,450 Q400,350 500,400" stroke="#111" stroke-width="10" fill="none" />
        </svg>

        <div class="absolute top-10 w-full text-center pointer-events-none">
            <h1 class="text-rose-500 text-3xl font-black">4월의 기억</h1>
            <p class="text-rose-100 opacity-60 text-sm mt-2">화면 곳곳에 피어난 마음을 확인해보세요.</p>
        </div>
    </div>

    <!-- 플로팅 액션 버튼 -->
    <div id="fab" onclick="openModal()">
        <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>

    <!-- 글쓰기 모달 -->
    <div id="modal-overlay">
        <div id="memorial-modal">
            <h3 class="text-xl font-bold text-rose-100">동백꽃 한 송이 피우기</h3>
            <textarea id="msg-input" placeholder="추모의 마음을 담은 문장을 적어주세요."></textarea>
            <div class="flex justify-end gap-4">
                <button onclick="closeModal()" class="text-gray-400 font-bold px-2">취소</button>
                <button id="submit-btn" onclick="saveFlower()" class="bg-rose-600 text-white px-6 py-2 rounded-full font-bold">꽃 피우기</button>
            </div>
        </div>
    </div>

    <!-- 메시지 표시용 버블 -->
    <div id="msg-bubble" class="message-bubble"></div>

    <script>
        let db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'camellia-global-v1';
        const renderedIds = new Set();

        function startApp() {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro').style.display = 'none'; }, 1000);
            initFirebase();
        }

        async function initFirebase() {
            try {
                const config = JSON.parse(__firebase_config);
                firebase.initializeApp(config);
            } catch(e) {
                firebase.initializeApp({
                    apiKey: "AIzaSyDTrSN6wwJEAjiL3HwMh9woNmJ5NwSg1cQ",
                    authDomain: "tree-7ef79.firebaseapp.com",
                    projectId: "tree-7ef79"
                });
            }
            db = firebase.firestore();
            
            await firebase.auth().signInAnonymously();
            
            // 실시간 리스너 시작
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers')
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            if (!renderedIds.has(change.doc.id)) {
                                createFlower(data.x, data.y, data.message);
                                renderedIds.add(change.doc.id);
                            }
                        }
                    });
                });
            
            createStars();
        }

        function createFlower(x, y, msg) {
            const canvas = document.getElementById('main-canvas');
            const flower = document.createElement('div');
            flower.className = 'camellia-flower';
            // 화면 크기 대비 퍼센트 위치로 배치
            flower.style.left = x + '%';
            flower.style.top = y + '%';

            flower.innerHTML = `
                <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
                    <circle cx="50" cy="35" r="22" fill="#e11d48" /><circle cx="50" cy="65" r="22" fill="#e11d48" />
                    <circle cx="35" cy="50" r="22" fill="#e11d48" /><circle cx="65" cy="50" r="22" fill="#e11d48" />
                    <circle cx="50" cy="50" r="12" fill="#fbbf24" />
                </svg>
            `;

            // 클릭/터치 이벤트
            const handleClick = (e) => {
                e.stopPropagation();
                const bubble = document.getElementById('msg-bubble');
                bubble.innerText = msg;
                bubble.style.display = 'block';
                
                const rect = flower.getBoundingClientRect();
                bubble.style.left = rect.left + (rect.width/2) + 'px';
                bubble.style.top = rect.top + 'px';

                setTimeout(() => { bubble.style.display = 'none'; }, 3500);
            };

            flower.onclick = handleClick;
            flower.ontouchstart = (e) => { handleClick(e); };

            canvas.appendChild(flower);
            
            // 나타나는 애니메이션
            setTimeout(() => {
                flower.style.transform = `translate(-50%, -50%) scale(1) rotate(${Math.random() * 360}deg)`;
            }, 100);
        }

        async function saveFlower() {
            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (!msg) return;

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "피우는 중...";

            // 화면 전체 영역 중 랜덤한 위치 (테두리 10% 제외)
            const x = 10 + Math.random() * 80;
            const y = 15 + Math.random() * 70;

            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers').add({
                    message: msg,
                    x: x,
                    y: y,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                closeModal();
            } catch (e) {
                // 저장 실패 시 로컬에서라도 피움
                createFlower(x, y, msg);
                closeModal();
            }
        }

        function createStars() {
            const bg = document.getElementById('stars-bg');
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = (Math.random()*2+0.5)+'px';
                star.style.left = Math.random()*100+'%';
                star.style.top = Math.random()*100+'%';
                bg.appendChild(star);
            }
        }

        function openModal() { document.getElementById('modal-overlay').style.display = 'block'; }
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('msg-input').value = '';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "꽃 피우기";
        }

        // 초기 별 생성
        createStars();
    </script>
</body>
</html>
