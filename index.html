<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4월엔 동백꽃을 달아주세요 - 제주 4.3 추모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (안정적인 버전 사용) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&display=swap" rel="stylesheet">
    <style>
        .brush-font { font-family: 'Nanum Brush Script', cursive; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at bottom, #161625 0%, #050505 100%);
            color: #f1f5f9;
            overflow: hidden;
            margin: 0;
            height: 100dvh;
        }
        #intro-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            background: #0a0a0a; transition: opacity 1.2s ease;
        }
        .intro-camellia { width: clamp(140px, 40vw, 180px); cursor: pointer; filter: drop-shadow(0 0 30px rgba(225, 29, 72, 0.5)); transition: 0.3s; }
        .intro-camellia:active { transform: scale(0.95); }
        
        #memorial-tree-container {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 800px; height: 80vh; opacity: 0; transition: opacity 2s;
        }
        #flower-layer { position: absolute; inset: 0; z-index: 50; }
        .flower-node { 
            position: absolute; cursor: pointer; 
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        #memorial-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #121212; padding: 2rem; border-radius: 30px; z-index: 2000; width: 90%; max-width: 400px;
            border: 1px solid #e11d48; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #msg-input { 
            width: 100%; height: 150px; background: #1a1a1a; color: #fff; padding: 15px; 
            border-radius: 15px; border: 1px solid #333; resize: none; margin-bottom: 15px;
            font-size: 1.2rem; outline: none;
        }
        #msg-input:focus { border-color: #e11d48; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--t) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        
        .tooltip {
            position: fixed; background: white; color: black; padding: 10px 15px; border-radius: 10px;
            display: none; z-index: 3000; pointer-events: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 1.1rem; max-width: 250px; text-align: center;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(225, 29, 72, 0.9); color: white; padding: 10px 25px; border-radius: 50px;
            z-index: 5000; display: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="toast" class="toast"></div>

    <div id="intro-screen">
        <h2 class="brush-font text-5xl text-rose-100 mb-10">4월엔 동백꽃을 달아주세요</h2>
        <div class="intro-camellia" id="start-memorial-btn">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="32" r="23" fill="#e11d48" /><circle cx="50" cy="68" r="23" fill="#e11d48" />
                <circle cx="32" cy="50" r="23" fill="#e11d48" /><circle cx="68" cy="50" r="23" fill="#e11d48" />
                <circle cx="50" cy="50" r="14" fill="#fbbf24" />
            </svg>
        </div>
        <p class="brush-font text-2xl text-rose-300 mt-8 animate-pulse">동백꽃을 눌러주세요</p>
    </div>

    <div id="main-ui" style="opacity:0;" class="absolute top-10 w-full text-center z-[100] transition-opacity duration-1000 pointer-events-none">
        <h1 class="brush-font text-rose-500 text-5xl md:text-6xl">4월엔 동백꽃을 달아주세요</h1>
        <p class="brush-font text-rose-200 text-2xl mt-2 opacity-70">여러분의 마음이 나무를 피웁니다.</p>
    </div>

    <div id="memorial-tree-container">
        <svg id="tree-svg" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
            <path d="M260,800 L340,800 Q320,550 300,450 Q280,550 260,800 Z" fill="#0f0f1a" />
            <g id="tree-branches" stroke="#0f0f1a" fill="none" stroke-width="15" stroke-linecap="round">
                <path d="M300,450 Q200,420 80,450" /><path d="M300,450 Q400,380 520,420" />
                <path d="M300,350 Q200,300 120,250" /><path d="M300,350 Q400,280 480,240" />
                <path d="M300,450 L300,100" stroke-width="12" />
            </g>
        </svg>
        <div id="flower-layer"></div>
    </div>

    <div id="write-trigger" style="display:none;" class="fixed bottom-10 right-10 w-20 h-20 cursor-pointer z-[500] animate-bounce">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#e11d48" opacity="0.8" />
            <path d="M30,50 L70,50 M50,30 L50,70" stroke="white" stroke-width="8" stroke-linecap="round" />
        </svg>
    </div>

    <div id="memorial-modal">
        <h3 class="brush-font text-3xl text-rose-100 mb-4 text-center">추모의 글 남기기</h3>
        <textarea id="msg-input" placeholder="이곳에 따뜻한 마음을 적어주세요..."></textarea>
        <div class="flex justify-center gap-4">
            <button id="close-modal-btn" class="brush-font text-2xl text-gray-400 px-4">닫기</button>
            <button id="send-btn" class="brush-font text-2xl bg-rose-600 text-white px-8 py-2 rounded-full shadow-lg">꽃 피우기</button>
        </div>
    </div>

    <div id="tooltip" class="tooltip"></div>

    <script>
        // Global environment variables
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jeju-43-memorial';

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const renderedIds = new Set();

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        /**
         * RULE 3: Auth Before Queries
         * Custom token을 먼저 사용하고 실패하거나 없을 경우 익명 로그인을 시도합니다.
         */
        async function startAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
            } catch (error) {
                console.error("Auth Error:", error);
                // 만약 익명 로그인이 활성화되지 않았다면 유저에게 알림
                if (error.code === 'auth/admin-restricted-operation') {
                    showToast("Firebase 설정에서 '익명 로그인'을 활성화해주세요.");
                } else {
                    showToast("서버 인증에 실패했습니다.");
                }
            }
        }

        // 로그인 상태 감지 후 데이터 로드
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log("Authenticated as:", user.uid);
                loadFlowers();
            }
        });

        function loadFlowers() {
            /** * RULE 1: Strict Paths
             * /artifacts/{appId}/public/data/{collectionName}
             */
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers')
                .onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            if (!renderedIds.has(change.doc.id)) {
                                renderFlower(data.x, data.y, data.message);
                                renderedIds.add(change.doc.id);
                            }
                        }
                    });
                }, (err) => {
                    console.error("Firestore Listen Error:", err);
                    if (err.code === 'permission-denied') {
                        showToast("데이터 읽기 권한이 거부되었습니다.");
                    }
                });
        }

        async function plantFlower() {
            const user = auth.currentUser;
            if (!user) {
                showToast("인증 중입니다. 잠시만 기다려주세요.");
                return;
            }

            const input = document.getElementById('msg-input');
            const msg = input.value.trim();
            if (!msg) return;

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.innerText = "피우는 중...";

            try {
                const x = 20 + (Math.random() * 60); 
                const y = 15 + (Math.random() * 45);

                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('flowers').add({
                    message: msg,
                    x: x,
                    y: y,
                    uid: user.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                closeModal();
                showToast("동백꽃이 피어났습니다.");
            } catch (e) {
                console.error("Save Error:", e);
                showToast("꽃을 피우지 못했습니다. 경로와 규칙을 확인하세요.");
                btn.disabled = false;
                btn.innerText = "꽃 피우기";
            }
        }

        function renderFlower(x, y, msg) {
            const layer = document.getElementById('flower-layer');
            const wrap = document.createElement('div');
            wrap.className = 'flower-node';
            wrap.style.left = x + '%'; 
            wrap.style.top = y + '%';
            
            wrap.innerHTML = `
                <svg viewBox="0 0 100 100" width="35" height="35">
                    <circle cx="50" cy="32" r="23" fill="#e11d48" />
                    <circle cx="50" cy="68" r="23" fill="#e11d48" />
                    <circle cx="32" cy="50" r="23" fill="#e11d48" />
                    <circle cx="68" cy="50" r="23" fill="#e11d48" />
                    <circle cx="50" cy="50" r="14" fill="#fbbf24" />
                </svg>
            `;

            wrap.onclick = (e) => {
                const tt = document.getElementById('tooltip');
                tt.innerText = msg;
                tt.style.display = 'block';
                tt.style.left = Math.min(window.innerWidth - 260, Math.max(10, e.clientX - 125)) + 'px';
                tt.style.top = (e.clientY - 60) + 'px';
                setTimeout(() => tt.style.display = 'none', 3000);
            };

            layer.appendChild(wrap);
            setTimeout(() => wrap.style.transform = 'translate(-50%, -50%) scale(1)', 100);
        }

        // UI 이벤트 바인딩
        document.getElementById('start-memorial-btn').onclick = () => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('memorial-tree-container').style.opacity = '1';
                document.getElementById('main-ui').style.opacity = '1';
                document.getElementById('write-trigger').style.display = 'block';
            }, 1200);
        };

        const openModal = () => { document.getElementById('memorial-modal').style.display = 'block'; };
        const closeModal = () => { 
            document.getElementById('memorial-modal').style.display = 'none'; 
            document.getElementById('msg-input').value = '';
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').innerText = "꽃 피우기";
        };

        document.getElementById('write-trigger').onclick = openModal;
        document.getElementById('close-modal-btn').onclick = closeModal;
        document.getElementById('send-btn').onclick = plantFlower;

        // 배경 별 생성
        const starsContainer = document.getElementById('stars');
        for(let i=0; i<80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.width = s.style.height = Math.random()*2.5+'px';
            s.style.setProperty('--t', Math.random()*3+2+'s');
            starsContainer.appendChild(s);
        }

        // 초기화 시 인증 시작
        startAuth();
    </script>
</body>
</html>
